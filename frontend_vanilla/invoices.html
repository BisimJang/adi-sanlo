<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/style.css">
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-logo"><span class="mark"></span>Adi&#8209;Sanlo</div>
  <nav class="sidebar-nav">
    <a href="dashboard.html">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="1" y="1" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.4"/><rect x="9" y="1" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.4"/><rect x="1" y="9" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.4"/><rect x="9" y="9" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.4"/></svg>
      Overview
    </a>
    <a href="subscribers.html">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="5" r="3" stroke="currentColor" stroke-width="1.4"/><path d="M2 14c0-3.314 2.686-5 6-5s6 1.686 6 5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
      Subscribers
    </a>
    <a href="invoices.html" class="active">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="2" y="1" width="12" height="14" rx="1.5" stroke="currentColor" stroke-width="1.4"/><path d="M5 5h6M5 8h6M5 11h4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
      Invoices
    </a>
    <a href="webhook-logs.html">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2 8h3l2-5 2 10 2-5h3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Webhook Logs
    </a>
  </nav>
</aside>

<div class="main">
  <div class="topbar">
    <div class="topbar-title">Invoices</div>
    <div class="topbar-meta" id="topbar-date"></div>
  </div>

  <div class="page-body">
    <div class="page-heading">
      <div>
        <h1>Invoices</h1>
        <div class="sub">Billing history and dunning</div>
      </div>
    </div>

    <div class="panel">
      <div class="table-wrap" id="table-wrap">
        <div class="loading">Loading invoices</div>
      </div>
    </div>
  </div>
</div>

<script src="assets/api.js"></script>
<script>
  document.getElementById('topbar-date').textContent = new Date().toLocaleDateString('en-NG', { weekday:'long', day:'numeric', month:'long', year:'numeric' });

  async function loadData() {
    const wrap = document.getElementById('table-wrap');
    try {
      const invoices = await api('/v1/invoices');
      
      if (!invoices.length) {
        wrap.innerHTML = '<div class="empty-state"><p>No invoices found.</p></div>';
        return;
      }

      wrap.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Status</th>
              <th>Amount</th>
              <th>Date</th>
              <th>Attempts</th>
              <th>Sub ID</th>
            </tr>
          </thead>
          <tbody>
            ${invoices.map(i => `
              <tr>
                <td class="mono">${i.id.slice(0,8)}</td>
                <td>${badge(i.status)}</td>
                <td class="amount">${fmt.naira(i.amount / 100)}</td>
                <td class="mono">${fmt.date(i.created_at)}</td>
                <td class="mono">${i.attempt_count}</td>
                <td class="mono">${i.subscription_id.slice(0,8)}...</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
    } catch (e) {
      showError('table-wrap', e.message);
    }
  }

  loadData();
</script>
</body>
</html>
